# PostgreSQL for integration tests. Start with: docker-compose -f docker-compose.test.yml up -d
# Then run tests; they will use ConnectionStrings__PrsConnection from environment or this default.
services:
  postgres-test:
    image: postgres:16-alpine
    container_name: prs-portal-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
      POSTGRES_DB: prs_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5
